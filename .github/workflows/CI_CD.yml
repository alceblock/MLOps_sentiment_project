# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: continuous integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Train model
      run: |
        export PYTHONPATH=$PWD
        python model_app/model_training.py
    - name: Test with pytest
      run: |
        pytest
    - name: Save trained model as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: ${{ github.workspace }}/my_latest_model

  deploy:
    runs-on: ubuntu-latest

    needs: ci
    if: ${{ vars.RUN_DEPLOY == 'true' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install huggingface_hub python-dotenv
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Download trained model
      uses: actions/download-artifact@v4
      with:
        name: trained-model
        path: ${{ github.workspace }}/my_latest_model
    - name: Set environment variables
      run: |
        echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> $GITHUB_ENV
        echo "REPO_ID=${{ secrets.REPO_ID }}" >> $GITHUB_ENV
    - name: Deploy to Hugging Face
      run: |
        python deploy/deploy_hf.py